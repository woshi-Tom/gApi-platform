version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gapi-postgres
    environment:
      POSTGRES_USER: gapi
      POSTGRES_PASSWORD: gapi123
      POSTGRES_DB: gapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gapi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gapi-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: gapi
      RABBITMQ_DEFAULT_PASS: gapi123
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  rabbitmq_data:
