services:
  postgres:
    image: postgres:16-alpine
    container_name: gapi-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: gapi
      POSTGRES_USER: gapi
      POSTGRES_PASSWORD: gapi123
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gapi -d gapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gapi-test-network

  redis:
    image: redis:7-alpine
    container_name: gapi-redis-test
    restart: unless-stopped
    command: redis-server --requirepass redis123
    volumes:
      - redis_data_test:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gapi-test-network

  backend:
    image: gapi-backend:test
    container_name: gapi-backend-test
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GAPI_DB_HOST: postgres
      GAPI_DB_PORT: 5432
      GAPI_DB_USER: gapi
      GAPI_DB_PASSWORD: gapi123
      GAPI_DB_NAME: gapi
      GAPI_REDIS_HOST: redis
      GAPI_REDIS_PORT: 6379
      GAPI_REDIS_PASSWORD: redis123
      GAPI_SERVER_PORT: 8080
      GAPI_MODE: debug
      GAPI_FRONTEND_URL: http://localhost:5173
      GAPI_ADMIN_FRONTEND_URL: http://localhost:5174
      GAPI_JWT_SECRET: gapi-platform-jwt-secret-key-change-in-production-32chars
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gapi-test-network

  frontend:
    image: gapi-frontend:test
    container_name: gapi-frontend-test
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - gapi-test-network

  admin:
    image: gapi-admin:test
    container_name: gapi-admin-test
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"
    networks:
      - gapi-test-network

  playwright:
    image: mcr.microsoft.com/playwright:v1.50.0-jammy
    container_name: gapi-playwright-test
    depends_on:
      - frontend
      - admin
      - backend
    working_dir: /app
    volumes:
      - ../frontend:/app
      - ../backend/scripts:/seed
      - playwright-results:/app/test-results
      - playwright-reports:/app/playwright-report
    environment:
      FRONTEND_URL: http://frontend:80
      ADMIN_URL: http://admin:80
      API_URL: http://backend:8080
      PLAYWRIGHT_BASE_URL: http://frontend:80
      API_BASE_URL: http://backend:8080
    command: sh -c "cp /seed/seed.sql /tmp/ && docker exec gapi-postgres-test psql -U gapi -d gapi -f /tmp/seed.sql && npm ci && npx playwright install chromium && npx playwright test"
    networks:
      - gapi-test-network

volumes:
  postgres_data_test:
  redis_data_test:
  playwright-results:
  playwright-reports:

networks:
  gapi-test-network:
    driver: bridge
