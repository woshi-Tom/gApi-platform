services:
  postgres:
    image: postgres:16-alpine
    container_name: gapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gapi
      POSTGRES_USER: gapi
      POSTGRES_PASSWORD: gapi123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gapi -d gapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gapi-network

  redis:
    image: redis:7-alpine
    container_name: gapi-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gapi-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gapi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GAPI_DB_HOST: postgres
      GAPI_DB_PORT: 5432
      GAPI_DB_USER: gapi
      GAPI_DB_PASSWORD: gapi123
      GAPI_DB_NAME: gapi
      GAPI_REDIS_HOST: redis
      GAPI_REDIS_PORT: 6379
      GAPI_REDIS_PASSWORD: redis123
      GAPI_SERVER_PORT: 8080
      GAPI_MODE: debug
      GAPI_FRONTEND_URL: http://localhost:5173
      GAPI_ADMIN_FRONTEND_URL: http://localhost:5174
      GAPI_JWT_SECRET: gapi-platform-jwt-secret-key-change-in-production-32chars
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gapi-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: gapi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - gapi-network

  admin:
    build:
      context: ../frontend
      dockerfile: Dockerfile.admin
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: gapi-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"
    networks:
      - gapi-network

volumes:
  postgres_data:
  redis_data:

networks:
  gapi-network:
    driver: bridge
