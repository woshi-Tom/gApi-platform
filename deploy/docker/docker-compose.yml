services:
  postgres:
    image: postgres:16-alpine
    container_name: gapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-gapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gapi} -d ${POSTGRES_DB:-gapi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gapi-network

  redis:
    image: redis:7-alpine
    container_name: gapi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev_password_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_password_change_me}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gapi-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gapi-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-gapi}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-dev_password_change_me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gapi-network

  backend:
    image: gapi-backend:test
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: gapi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      GAPI_DB_HOST: postgres
      GAPI_DB_PORT: 5432
      GAPI_DB_USER: ${POSTGRES_USER:-gapi}
      GAPI_DB_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
      GAPI_DB_NAME: ${POSTGRES_DB:-gapi}
      GAPI_REDIS_HOST: redis
      GAPI_REDIS_PORT: 6379
      GAPI_REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_password_change_me}
      GAPI_RABBITMQ_HOST: rabbitmq
      GAPI_RABBITMQ_PORT: 5672
      GAPI_RABBITMQ_USER: ${RABBITMQ_USER:-gapi}
      GAPI_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-dev_password_change_me}
      GAPI_SERVER_PORT: 8080
      GAPI_MODE: debug
      GAPI_FRONTEND_URL: http://localhost:5173
      GAPI_ADMIN_FRONTEND_URL: http://localhost:5174
      GAPI_JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production_min_32chars}
      GAPI_ALIPAY_ENABLED: ${GAPI_ALIPAY_ENABLED:-false}
      GAPI_ALIPAY_SANDBOX: ${GAPI_ALIPAY_SANDBOX:-true}
      GAPI_ALIPAY_APP_ID: ${GAPI_ALIPAY_APP_ID:-}
      GAPI_ALIPAY_PRIVATE_KEY: ${GAPI_ALIPAY_PRIVATE_KEY:-}
      GAPI_ALIPAY_PUBLIC_KEY: ${GAPI_ALIPAY_PUBLIC_KEY:-}
      GAPI_ALIPAY_ENCRYPT_KEY: ${GAPI_ALIPAY_ENCRYPT_KEY:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gapi-network

  frontend:
    image: gapi-frontend:test
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: gapi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - gapi-network

  admin:
    image: gapi-admin:test
    build:
      context: ../../frontend
      dockerfile: Dockerfile.admin
      args:
        VITE_API_BASE_URL: ""
    container_name: gapi-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"
    networks:
      - gapi-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  gapi-network:
    driver: bridge
