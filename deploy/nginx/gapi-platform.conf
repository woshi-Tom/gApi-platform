# ============================================================================
# UPSTREAM BACKENDS (Internal definitions)
# ============================================================================

upstream gapi_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ============================================================================
# FRONTEND - Consumer App (Port 5173 - IPv4 + IPv6)
# ============================================================================

server {
    listen 5173;
    listen [::]:5173;
    server_name _;
    
    root /var/www/gapi-platform/dist;
    index index.html;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # API proxy
    location /api/ {
        proxy_pass http://gapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    
    # SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ============================================================================
# FRONTEND - Admin Dashboard (Port 5174 - IPv4 + IPv6)
# ============================================================================

