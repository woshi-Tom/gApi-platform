name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '22'

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Backend
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o gapi-server ./cmd/server

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/gapi-server

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Admin
        run: |
          cd frontend
          npm run build:admin

      - name: Upload Admin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: frontend/dist-admin

  docker:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-admin]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: vars
        run: |
          FULL_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          OWNER=$(echo "$FULL_NAME" | cut -d'/' -f1)
          REPO=$(echo "$FULL_NAME" | cut -d'/' -f2)
          echo "full=$FULL_NAME" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Backend
        run: |
          mkdir -p backend
          cp artifacts/backend-binary/gapi-server backend/

      - name: Prepare Frontend
        run: |
          cp -r artifacts/frontend-dist/ frontend/dist
          mkdir -p frontend/dist-admin
          cp -r artifacts/admin-dist/. frontend/dist-admin/
          mv frontend/dist-admin/admin.html frontend/dist-admin/index.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Docker Image
        run: |
          cd backend
          docker build -t ghcr.io/${{ steps.vars.outputs.full }}/backend:latest .
          docker push ghcr.io/${{ steps.vars.outputs.full }}/backend:latest

      - name: Build Frontend Docker Image
        run: |
          docker build -f frontend/Dockerfile -t ghcr.io/${{ steps.vars.outputs.full }}/frontend:latest ./frontend
          docker push ghcr.io/${{ steps.vars.outputs.full }}/frontend:latest

      - name: Build Admin Docker Image
        run: |
          docker build -f frontend/Dockerfile.admin -t ghcr.io/${{ steps.vars.outputs.full }}/admin:latest ./frontend
          docker push ghcr.io/${{ steps.vars.outputs.full }}/admin:latest

  release:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-admin]
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set lowercase name
        id: vars
        run: |
          FULL_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "full=$FULL_NAME" >> $GITHUB_OUTPUT

      - name: Prepare Package
        run: |
          mkdir -p release
          
          # Backend binary
          cp -r artifacts/backend-binary/gapi-server release/ 2>/dev/null || \
            cp -r artifacts/backend-binary/*/gapi-server release/ 2>/dev/null || \
            find artifacts/backend-binary -name 'gapi-server' -exec cp {} release/ \;
          
          # Frontend
          cp -r artifacts/frontend-dist release/gapi-frontend 2>/dev/null || \
            cp -r artifacts/frontend-dist/* release/gapi-frontend 2>/dev/null || \
            cp -r artifacts/frontend-dist/. release/gapi-frontend/
          
          # Admin
          cp -r artifacts/admin-dist release/gapi-admin 2>/dev/null || \
            cp -r artifacts/admin-dist/* release/gapi-admin 2>/dev/null || \
            cp -r artifacts/admin-dist/. release/gapi-admin/
          
          # Config files
          cp -r deploy/docker/docker-compose.yml release/
          cp -r deploy/docker/.env.example release/
          cp .env.example release/
          cp README.md release/ 2>/dev/null || true
          cp CHANGELOG.md release/ 2>/dev/null || true
          
          # Create release README with version
          VERSION=${{ github.ref_name }}
          sed "s/\$VERSION/$VERSION/g" release-readme.txt > release/README.md

      - name: Create Release Package
        run: |
          cd release
          echo "gAPI Platform ${{ github.ref_name }}" > VERSION.txt
          tar -czvf ../gapi-platform-${{ github.ref_name }}.tar.gz .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: gapi-platform-${{ github.ref_name }}.tar.gz
