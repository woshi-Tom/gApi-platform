name: Build and Release

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  # Build Backend
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Backend
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o gapi-server ./cmd/server

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/gapi-server

  # Build Frontend User
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # Build Admin Frontend
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Admin
        run: |
          cd frontend
          npm run build:admin

      - name: Upload Admin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: frontend/dist-admin

  # Build Docker Images
  docker:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-admin]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: backend

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download Admin Artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: frontend/dist-admin

      - name: Prepare Admin Files
        run: |
          mv frontend/dist-admin/admin.html frontend/dist-admin/index.html

      # Backend Docker Image
      - name: Build Backend Docker Image
        run: |
          cd backend
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest .

      - name: Push Backend Image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest

      # Frontend Docker Image
      - name: Build Frontend Docker Image
        run: |
          docker build -f frontend/Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest .

      - name: Push Frontend Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

      # Admin Docker Image
      - name: Build Admin Docker Image
        run: |
          docker build -f frontend/Dockerfile.admin -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin:latest .

      - name: Push Admin Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin:latest

  # Create Release Package
  release:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-admin]
    if: github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Package
        run: |
          mkdir -p release
          cp -r artifacts/backend-binary release/
          cp -r artifacts/frontend-dist release/
          cp -r artifacts/admin-dist release/
          cp -r deploy/docker/docker-compose.yml release/
          cp -r deploy/docker/.env.example release/
          cp .env.example release/
          cd release
          mv frontend-dist gapi-frontend
          mv admin-dist gapi-admin
          mv backend-binary gapi-server

      - name: Create Release Package
        run: |
          cd release
          tar -czvf ../gapi-platform-${{ github.ref_name }}.tar.gz .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: gapi-platform-${{ github.ref_name }}.tar.gz
