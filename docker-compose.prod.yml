# gAPI Platform - Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: gapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-gapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-gapi}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gapi-network

  redis:
    image: redis:7-alpine
    container_name: gapi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gapi-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gapi-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-gapi}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me_in_production}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gapi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gapi-backend
    restart: unless-stopped
    environment:
      GAPI_MODE: production
      GAPI_DB_HOST: postgres
      GAPI_DB_PORT: 5432
      GAPI_DB_USER: ${DB_USER:-gapi}
      GAPI_DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      GAPI_DB_NAME: ${DB_NAME:-gapi}
      GAPI_REDIS_HOST: redis
      GAPI_REDIS_PORT: 6379
      GAPI_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GAPI_RABBITMQ_HOST: rabbitmq
      GAPI_RABBITMQ_PORT: 5672
      GAPI_RABBITMQ_USER: ${RABBITMQ_USER:-gapi}
      GAPI_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change_me_in_production}
      GAPI_JWT_SECRET: ${JWT_SECRET:-change_me_use_32_chars_minimum}
      GAPI_ADMIN_SECRET: ${ADMIN_SECRET:-change_me_in_production}
      GAPI_SERVER_PORT: "8080"
      GAPI_FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gapi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gapi-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - gapi-network

  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.admin
    container_name: gapi-admin-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5174:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - gapi-network

  nginx:
    image: nginx:alpine
    container_name: gapi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - admin-frontend
      - backend
    networks:
      - gapi-network

volumes:
  pgdata:
  redis_data:
  rabbitmq_data:
  nginx_logs:

networks:
  gapi-network:
    driver: bridge
