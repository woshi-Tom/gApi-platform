server:
  port: "8080"
  admin_port: "9000"
  admin_bind: "0.0.0.0"
  mode: "debug"
  frontend: "http://localhost:5173"
  admin_frontend: "http://localhost:5174"
  admin_secret: "gapi-admin-secret-key-2026"

jwt:
  secret: "gapi-jwt-secret-key-2026-at-least-32-characters-long"
  expiry_hours: 168

admin_users:
  - username: "admin"
    password: "admin123"
    role: "super_admin"
  - username: "operator"
    password: "operator123"
    role: "operator"

database:
  host: "gapi-postgres"
  port: 5432
  user: "gapi"
  password: "gapi123"
  database: "gapi"
  max_open: 100
  max_idle: 10

redis:
  host: "gapi-redis"
  port: 6379
  password: "redis123"
  db: 0

rabbitmq:
  url: "amqp://guest:guest@gapi-rabbitmq:5672/"
